<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4">Event Gallery</h2>

    <!-- Carousel -->
    <div id="galleryCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner rounded">
            <div class="carousel-item active">
                <img src="pictures/back-view-crowd-fans-watching-live-performance-music-concert-night-copy-space.jpg" class="d-block w-100" height="450" alt="Event 1">
            </div>
            <div class="carousel-item">
                <img src="pictures/decorated-banquet-hall-with-flowers.jpg" class="d-block w-100" height="450" alt="Event 2">
            </div>
            <div class="carousel-item">
                <img src="pictures/excited-audience-watching-confetti-fireworks-having-fun-music-festival-night-copy-space.jpg" class="d-block w-100" height="450" alt="Event 3">
            </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

  
    <div class="row g-4">

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
              
                <div class="card-body text-center">
                    <h5 class="card-title">Technical Quiz</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
              
                <div class="card-body text-center">
                    <h5 class="card-title">Hackathon</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
               
                <div class="card-body text-center">
                    <h5 class="card-title">Poster Presentation</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
              
                <div class="card-body text-center">
                    <h5 class="card-title">Coding Contest</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
             
                <div class="card-body text-center">
                    <h5 class="card-title">Project Expo</h5>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-sm-6">
            <div class="card h-100">
              
                <div class="card-body text-center">
                    <h5 class="card-title">Cultural Fest</h5>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
