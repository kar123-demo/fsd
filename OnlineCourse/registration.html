

<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body >
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
       <div class="container mt-5">
    <div class="card ">
        <div class="card-header  text-dark">
            <h3 class="text-center">Student Registration Form</h3>
        </div>

        <div class="card-body">
            <form class="needs-validation" novalidate>

       
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                      
                        <input type="text" class="form-control" required>
                        <div class="invalid-feedback">
                            Please enter your full name.
                        </div>
                    </div>
                </div>

       
                <div class="mb-3">
                    <label class="form-label">Roll Number</label>
                    <input type="text" class="form-control" required>
                    <div class="invalid-feedback">
                        Roll Number is required.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control"  required>
                    <div class="invalid-feedback">
                        Enter a valid email address.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel"
                           class="form-control"
                           pattern="[0-9]{10}"
                           maxlength="10"
                           required>
                    <div class="invalid-feedback">
                        Enter a valid 10-digit mobile number.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Gender</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" required>
                        <label class="form-check-label">Male</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">Female</label>
                    </div>

             
                </div>

                <div class="mb-3">
                    <label class="form-label">Branch</label>
                    <select class="form-select" required>
                        <option value="">Select Branch</option>
                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>MECH</option>
                        <option>CIVIL</option>
                    </select>
                    <div class="invalid-feedback">
                        Please select a branch.
                    </div>
                </div>

         
                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" required>
                    <div class="invalid-feedback">
                        Please select your date of birth.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="3" required></textarea>
                    <div class="invalid-feedback">
                        Address is required.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Photo</label>
                    <input type="file" class="form-control" accept="image/*" required>
                    <div class="invalid-feedback">
                        Please upload a photo.
                    </div>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label">
                        I agree to the Terms and Conditions
                    </label>
                    <div class="invalid-feedback">
                        You must accept the terms and conditions.
                    </div>
                </div>

            
                <div class="text-center">
                    <div id="liveAlertPlaceholder"></div>
<button type="button" class="btn btn-success me-2" id="liveAlertBtn">Submit</button>
                  

                    <button type="reset" class="btn btn-secondary">
                        Reset
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
<script>
    const alertPlaceholder = document.getElementById('liveAlertPlaceholder')
const appendAlert = (message, type) => {
  const wrapper = document.createElement('div')
  wrapper.innerHTML = [
    `<div class="alert alert-${type} alert-dismissible" role="alert">`,
    `   <div>${message}</div>`,
    '   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>',
    '</div>'
  ].join('')

  alertPlaceholder.append(wrapper)
}

const alertTrigger = document.getElementById('liveAlertBtn')
if (alertTrigger) {
  alertTrigger.addEventListener('click', () => {
    appendAlert('Registration SuccessFull!', 'success')
  })
}
</script>
</body>
</html>
